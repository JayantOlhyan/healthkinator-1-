<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primary-gradient" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31B4AB"/>
      <stop offset="1" stop-color="#1B8476"/>
    </linearGradient>
    <radialGradient id="glow-radial" cx="128" cy="128" r="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE135" stop-opacity="0.3"/>
      <stop offset="1" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="256" height="256" rx="72" fill="url(#primary-gradient)"/>
  <rect width="256" height="256" rx="72" fill="url(#glow-radial)"/>
  
  <g filter="url(#shadow)">
    <!-- Central Cross/Neural Icon -->
    <path d="M128 60V196M60 128H196" stroke="white" stroke-width="28" stroke-linecap="round"/>
    
    <!-- Connectivity Nodes -->
    <circle cx="128" cy="60" r="10" fill="#FFE135"/>
    <circle cx="128" cy="196" r="10" fill="#FFE135"/>
    <circle cx="60" cy="128" r="10" fill="#FFE135"/>
    <circle cx="196" cy="128" r="10" fill="#FFE135"/>
    
    <!-- Central Highlight Node -->
    <circle cx="128" cy="128" r="16" fill="white"/>
    <circle cx="128" cy="128" r="8" fill="#FFE135"/>
    
    <!-- Arched Connections -->
    <path d="M96 64C80 80 64 96 64 128" stroke="white" stroke-width="4" stroke-opacity="0.5" fill="none"/>
    <path d="M160 64C176 80 192 96 192 128" stroke="white" stroke-width="4" stroke-opacity="0.5" fill="none"/>
    <path d="M96 192C80 176 64 160 64 128" stroke="white" stroke-width="4" stroke-opacity="0.5" fill="none"/>
    <path d="M160 192C176 176 192 160 192 128" stroke="white" stroke-width="4" stroke-opacity="0.5" fill="none"/>
  </g>
</svg>

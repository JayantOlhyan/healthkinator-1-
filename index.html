<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healthkinator: AI Symptom Guesser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom selection color */
      ::selection {
        background-color: #a7f3d0; /* Tailwind emerald-200 */
        color: #065f46; /* Tailwind emerald-800 */
      }
      .dark ::selection {
        background-color: #065f46; /* Tailwind emerald-800 */
        color: #a7f3d0; /* Tailwind emerald-200 */
      }
      /* Simple fade-in animation */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }
      /* Chat bubble animations */
      @keyframes slideInFromLeft {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInFromRight {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .animate-slide-in-left {
        animation: slideInFromLeft 0.4s ease-out forwards;
      }
      .animate-slide-in-right {
        animation: slideInFromRight 0.4s ease-out forwards;
      }
      
      /* New Neon Glow Utilities */
      .glow-emerald {
        box-shadow: 0 0 20px rgba(49, 180, 171, 0.4);
      }
      .glow-emerald-strong {
        box-shadow: 0 0 30px rgba(49, 180, 171, 0.6), inset 0 0 10px rgba(49, 180, 171, 0.2);
      }
      .glow-orange {
        box-shadow: 0 0 15px rgba(224, 105, 50, 0.5);
      }
      .glow-orange-border {
        box-shadow: 0 0 10px rgba(224, 105, 50, 0.8), inset 0 0 5px rgba(224, 105, 50, 0.3);
      }
    </style>
    <script>
      // Force dark mode
      document.documentElement.classList.add('dark');

      // Tailwind config
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'brand-navy': '#081021',
              'brand-teal': '#1B8476',
              'brand-emerald': '#31B4AB',
              'brand-orange': '#E06932',
              'brand-danger': '#D33842',
              'brand-success': '#43B14B'
            },
            fontFamily: {
              'sans': ['Inter', 'sans-serif'],
            }
          },
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-brand-navy text-gray-100 min-h-screen transition-colors duration-300 antialiased selection:bg-brand-emerald selection:text-white">
    <div id="root"></div>

  </body>
</html>
